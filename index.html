<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QT4GHFHTVS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QT4GHFHTVS');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>WaveRadio - Pure Dance & Trance</title>
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💿</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --app-height: 100%; }
        body { transition: background 1.5s ease; height: 100dvh; height: var(--app-height); overflow: hidden; }
        @keyframes rotate-disc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate-disc 4s linear infinite !important; }
        @keyframes bar-bounce { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .music-bar { width: 3px; background: #3b82f6; border-radius: 10px; }
        .bar-anim { animation: bar-bounce 0.8s ease-in-out infinite; }
        .bar-2 { animation-delay: 0.2s; }
        .bar-3 { animation-delay: 0.4s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=range].eq-slider { -webkit-appearance: none; background: #27272a; height: 3px; border-radius: 5px; }
        input[type=range].eq-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 1px solid white; }
        #ambient-glow { position: fixed; inset: 0; pointer-events: none; opacity: 0.15; transition: background 2s ease; z-index: 0; }
        .vinyl-disc { background: #111; position: relative; border: 2px solid #333; }
        .vinyl-reflection { position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 0%, rgba(255,255,255,0.1) 15%, transparent 30%, transparent 50%, rgba(255,255,255,0.1) 65%, transparent 80%); border-radius: 50%; pointer-events: none; }
        
        .tooltip { position: relative; }
        .tooltip::after {
            content: attr(data-tip);
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: #1d4ed8; color: white; padding: 4px 8px; border-radius: 6px;
            font-size: 10px; font-weight: bold; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 100;
        }
        .tooltip:hover::after { opacity: 1; bottom: 140%; }
    </style>
</head>
<body class="flex flex-col bg-black text-gray-100 font-sans">
    <div id="ambient-glow"></div>
    <audio id="audio-player" crossorigin="anonymous"></audio>
    <audio id="noise-player" loop src="https://www.soundjay.com/misc/sounds/record-player-static-01.mp3"></audio>

    <div class="flex flex-1 overflow-hidden relative z-10">
        <!-- SIDEBAR -->
        <aside class="w-16 md:w-56 bg-gray-950/80 backdrop-blur-xl border-r border-white/5 flex flex-col shrink-0 relative">
            <div class="p-4 flex items-center gap-3 border-b border-white/5 justify-center md:justify-start">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/20">
                    <i data-lucide="disc-3" id="logo-icon" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-cyan-500 bg-clip-text text-transparent hidden md:block uppercase italic">WaveRadio</h1>
            </div>
            
            <nav class="p-3 space-y-4 flex-1 overflow-y-auto no-scrollbar">
                <div>
                    <div class="flex items-center justify-center md:justify-start gap-3 px-3 py-3 bg-white/5 text-blue-400 rounded-xl">
                        <i data-lucide="radio-receiver" class="w-5 h-5"></i>
                        <span class="hidden md:block font-bold uppercase text-[10px] tracking-widest text-white">Signal Source</span>
                    </div>
                    <div id="sidebar-now-playing" class="hidden md:block mt-4 px-3 py-3 border-l-2 border-blue-500 bg-blue-500/5 rounded-r-lg">
                        <p class="text-[8px] font-black uppercase text-blue-500 mb-1">Now Playing</p>
                        <p id="sidebar-source-name" class="text-[10px] font-bold text-gray-300 truncate uppercase tracking-tighter italic">Waiting...</p>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar relative pb-32">
            <header class="mb-6">
                <h2 class="text-3xl font-bold tracking-tight uppercase italic">Pure Electronic</h2>
                <p class="text-xs text-blue-500 uppercase tracking-[0.3em] mt-2 font-black">High-Energy Only</p>
            </header>

            <!-- Station Grid -->
            <div id="station-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-10 xl:grid-cols-12 gap-3 mb-6"></div>

            <div class="mb-8 bg-white/5 border border-white/5 rounded-2xl p-4 space-y-4">
                <div>
                    <h3 class="text-[10px] font-black uppercase text-gray-500 mb-2 flex items-center gap-2"><i data-lucide="link-2" class="w-3 h-3"></i> External Source</h3>
                    <div class="flex gap-2">
                        <input type="text" id="custom-url" placeholder="URL..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-blue-500">
                        <button onclick="playCustomUrl()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold transition-all uppercase">Load</button>
                    </div>
                </div>
                <div class="pt-2 border-t border-white/5">
                    <h3 class="text-[10px] font-black uppercase text-gray-500 mb-2 flex items-center gap-2"><i data-lucide="folder-open" class="w-3 h-3"></i> Local Playlist</h3>
                    <div class="flex items-center gap-2">
                        <label for="file-input" class="cursor-pointer bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 transition-all">
                            <i data-lucide="upload" class="w-3 h-3"></i> Files
                        </label>
                        <input type="file" id="file-input" accept="audio/*" multiple class="hidden" onchange="loadLocalFiles(event)">
                        <button id="resume-local-btn" onclick="resumeLocal()" class="hidden bg-orange-600/20 text-orange-400 border border-orange-600/30 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Resume</button>
                    </div>
                </div>
            </div>

            <div id="viz-container" oncontextmenu="nextVizMode(event)" class="w-full h-32 bg-blue-950/10 rounded-2xl border border-white/5 overflow-hidden relative cursor-pointer mb-6">
                <canvas id="canvas-viz" class="w-full h-full opacity-80"></canvas>
            </div>

            <div class="mb-6">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 flex items-center gap-2"><i data-lucide="history" class="w-3 h-3"></i> Recently Played</h3>
                <div id="history-list" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- DISCLAIMER -->
            <div class="mb-10 pt-4 border-t border-white/5">
                <p class="text-[9px] text-gray-600 uppercase tracking-widest leading-relaxed opacity-50 italic">
                    Non-commercial player. All streams are property of their respective broadcasters.
                </p>
            </div>

            <!-- EQ Panel -->
            <div id="eq-panel" class="fixed bottom-28 right-4 w-64 bg-gray-950/95 backdrop-blur-2xl border border-white/10 p-5 rounded-2xl shadow-2xl scale-95 opacity-0 pointer-events-none transition-all duration-300 z-[60]">
                <h3 class="text-[10px] font-black uppercase text-blue-500 mb-4 border-b border-white/5 pb-2">Equalizer</h3>
                <div class="space-y-4 mb-4">
                    <div><div class="flex justify-between text-[8px] text-gray-500 mb-1"><span>Bass</span><span id="v-bass">0dB</span></div><input type="range" id="eq-bass" min="-10" max="10" value="0" class="eq-slider w-full" oninput="updateEQ(true)"></div>
                    <div><div class="flex justify-between text-[8px] text-gray-500 mb-1"><span>Mid</span><span id="v-mid">0dB</span></div><input type="range" id="eq-mid" min="-10" max="10" value="0" class="eq-slider w-full" oninput="updateEQ(true)"></div>
                    <div><div class="flex justify-between text-[8px] text-gray-500 mb-1"><span>Treble</span><span id="v-treble">0dB</span></div><input type="range" id="eq-treble" min="-10" max="10" value="0" class="eq-slider w-full" oninput="updateEQ(true)"></div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPreset(6,2,5)" class="text-[8px] uppercase font-bold bg-white/5 py-2 rounded hover:bg-blue-600">Techno</button>
                    <button onclick="setPreset(5,0,6)" class="text-[8px] uppercase font-bold bg-white/5 py-2 rounded hover:bg-pink-600">Dance</button>
                    <button onclick="setPreset(8,-2,7)" class="text-[8px] uppercase font-bold bg-white/5 py-2 rounded hover:bg-cyan-600">Trance</button>
                </div>
            </div>
        </main>
    </div>

    <!-- PLAYER FOOTER -->
    <footer class="h-24 bg-gray-950/90 backdrop-blur-xl border-t border-white/10 px-4 md:px-10 flex items-center justify-between fixed bottom-0 w-full z-30">
        <div class="flex items-center gap-4 w-1/4 md:w-1/3" id="player-info"></div>
        
        <div class="flex flex-col items-center justify-center w-2/4 md:w-1/3">
            <div class="flex items-center gap-3 md:gap-6">
                <div class="hidden md:flex gap-1 items-end h-4 w-8 justify-end" id="bars-left"></div>
                <div class="flex items-center gap-1 md:gap-4">
                    <button onclick="playPrev()" class="p-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-back" class="w-4 h-4 md:w-5 md:h-5 fill-current"></i></button>
                    <button id="main-play-btn" class="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center bg-white text-black rounded-full hover:scale-110 active:scale-95 transition-all shadow-lg"><i data-lucide="play" class="w-5 h-5 md:w-6 md:h-6 fill-current ml-1"></i></button>
                    <button onclick="playNext()" class="p-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-forward" class="w-4 h-4 md:w-5 md:h-5 fill-current"></i></button>
                </div>
                <div class="hidden md:flex gap-1 items-end h-4 w-8" id="bars-right"></div>
            </div>
        </div>

        <div class="flex items-center justify-end gap-1 md:gap-3 w-1/4 md:w-1/3">
            <button onclick="toggleNoise()" id="noise-btn" class="p-2 text-gray-500 hover:text-orange-400 transition-all tooltip" data-tip="Vinyl Noise Filter">
                <i data-lucide="waves" class="w-5 h-5"></i>
            </button>
            <button onclick="toggleSleepTimer()" id="sleep-btn" class="p-2 text-gray-500 hover:text-purple-400 transition-all tooltip" data-tip="Sleep Timer (30 min)">
                <i data-lucide="moon" class="w-5 h-5"></i>
            </button>
            <button id="toggle-eq" class="p-2 md:p-3 rounded-xl transition-all group tooltip" data-tip="Sound Equalizer">
                <i data-lucide="sliders-horizontal" class="w-5 h-5 text-gray-500 group-hover:text-blue-400"></i>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7" class="hidden sm:block w-20 md:w-32 accent-blue-500">
        </div>
    </footer>

    <script>
        const STATIONS = [
            { id: 4, name: "ILove Dance", url: "https://streams.ilovemusic.de/iloveradio2.mp3", color: "from-pink-600 to-blue-600", ambient: "#db2777" },
            { id: 2, name: "ILove Trance", url: "https://streams.ilovemusic.de/iloveradio10.mp3", color: "from-blue-400 to-blue-800", ambient: "#1e40af" },
            { id: 7, name: "Club Mix", url: "https://streams.ilovemusic.de/iloveradio14.mp3", color: "from-purple-500 to-blue-700", ambient: "#7e22ce" },
            { id: 8, name: "Dub Step", url: "https://ice1.somafm.com/dubstep-128-mp3", color: "from-red-600 to-black", ambient: "#991b1b" },
            { id: 10, name: "Hardstyle", url: "https://streams.ilovemusic.de/iloveradio5.mp3", color: "from-red-700 to-black", ambient: "#7f1d1d" }
        ];
        let customStations = JSON.parse(localStorage.getItem('custom-stations')) || [];
        let state = { current: STATIONS[0], isPlaying: false, vizMode: 1, localFiles: [], localIndex: 0, history: [], isNoiseOn: false, sleepTimer: null };
        
        const audio = document.getElementById('audio-player');
        const noiseAudio = document.getElementById('noise-player');
        const volSlider = document.getElementById('volume-slider');
        let audioCtx, source, analyser, bassNode, midNode, trebleNode;
        let titleInterval = null;

        const favCanvas = document.createElement('canvas'); favCanvas.width = 32; favCanvas.height = 32;
        const favCtx = favCanvas.getContext('2d'); let favRotation = 0;

        // Scrolling title in browser tab
        function updatePageTitle() {
            if (titleInterval) { clearInterval(titleInterval); titleInterval = null; }
            if (state.isPlaying) {
                let titleText = `NOW PLAYING: ${state.current.name} --- `;
                titleInterval = setInterval(() => { titleText = titleText.substring(1) + titleText.substring(0, 1); document.title = titleText; }, 300);
            } else { document.title = "WaveRadio - Pure Dance & Trance"; }
        }

        // Animated Disc Favicon
        function animateFavicon() {
            if (!state.isPlaying) return;
            favCtx.clearRect(0, 0, 32, 32); favCtx.save(); favCtx.translate(16, 16); favCtx.rotate(favRotation);
            favCtx.font = "24px Arial"; favCtx.textAlign = "center"; favCtx.textBaseline = "middle"; favCtx.fillText("💿", 0, 0); favCtx.restore();
            document.getElementById('favicon').href = favCanvas.toDataURL('image/png');
            favRotation += 0.15; setTimeout(animateFavicon, 100);
        }

        // Initialize Audio Context and Nodes
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            
            // Equalizer Filters
            bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
            midNode = audioCtx.createBiquadFilter(); midNode.type = 'peaking'; midNode.frequency.value = 1000;
            trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
            
            source.connect(bassNode).connect(midNode).connect(trebleNode).connect(analyser).connect(audioCtx.destination);
            loadSavedEQ();
            drawViz();
        }

        // Toggle Background Vinyl Noise
        function toggleNoise() {
            state.isNoiseOn = !state.isNoiseOn;
            if(state.isNoiseOn) {
                noiseAudio.volume = 0.15;
                noiseAudio.play();
                document.getElementById('noise-btn').classList.add('text-orange-400');
            } else {
                noiseAudio.pause();
                document.getElementById('noise-btn').classList.remove('text-orange-400');
            }
        }

        // Toggle Sleep Timer (30 min)
        function toggleSleepTimer() {
            if(state.sleepTimer) {
                clearTimeout(state.sleepTimer);
                state.sleepTimer = null;
                document.getElementById('sleep-btn').classList.remove('text-purple-400');
                alert("Sleep timer cancelled");
            } else {
                state.sleepTimer = setTimeout(() => {
                    audio.pause();
                    state.isPlaying = false;
                    render();
                }, 30 * 60 * 1000);
                document.getElementById('sleep-btn').classList.add('text-purple-400');
                alert("Radio will turn off in 30 minutes");
            }
        }

        // Main Play/Pause Toggle
        async function togglePlay() {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (state.isPlaying) {
                audio.pause();
                state.isPlaying = false;
            } else {
                if (!audio.src || audio.src === window.location.href) audio.src = state.current.url;
                try {
                    await audio.play();
                    state.isPlaying = true;
                    animateFavicon();
                } catch(e) { console.error("Playback failed", e); }
            }
            render();
        }

        // Play specific station or file
        async function playSource(s, addToHistory = true) {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (state.current.url === s.url && state.isPlaying) {
                audio.pause();
                state.isPlaying = false;
            } else {
                state.current = s;
                audio.src = s.url;
                if(addToHistory) {
                    state.history = [s, ...state.history.filter(h => h.url !== s.url)].slice(0, 10);
                    localStorage.setItem('recent-history', JSON.stringify(state.history));
                }
                try {
                    await audio.play();
                    state.isPlaying = true;
                    animateFavicon();
                } catch(e) { state.isPlaying = false; }
            }
            render();
        }

        function playNext() {
            const all = [...STATIONS, ...customStations];
            const idx = all.findIndex(s => s.url === state.current.url);
            playSource(all[(idx + 1) % all.length]);
        }

        function playPrev() {
            const all = [...STATIONS, ...customStations];
            const idx = all.findIndex(s => s.url === state.current.url);
            playSource(all[(idx - 1 + all.length) % all.length]);
        }

        // Add custom stream URL
        function playCustomUrl() {
            const url = document.getElementById('custom-url').value; if(!url) return;
            const ns = { id: 'c-'+Date.now(), name: "User Stream", url: url, color: "from-gray-700 to-blue-900", ambient: "#1e3a8a", isCustom: true };
            customStations.push(ns); localStorage.setItem('custom-stations', JSON.stringify(customStations));
            playSource(ns); document.getElementById('custom-url').value = '';
        }

        // Remove a custom station
        function removeStation(id, e) {
            e.stopPropagation(); 
            customStations = customStations.filter(s => s.id !== id);
            localStorage.setItem('custom-stations', JSON.stringify(customStations));
            render();
        }

        // Load local audio files
        function loadLocalFiles(e) {
            const files = Array.from(e.target.files); if (!files.length) return;
            state.localFiles = files.map(f => ({ id: 'l-'+Math.random(), name: f.name.replace(/\.[^/.]+$/, ""), url: URL.createObjectURL(f), color: "from-orange-600 to-red-900", ambient: "#ea580c" }));
            document.getElementById('resume-local-btn').classList.remove('hidden');
            playSource(state.localFiles[0]);
        }
        function resumeLocal() { if(state.localFiles.length) playSource(state.localFiles[0]); }

        // Update EQ Node values
        function updateEQ(save = true) {
            if (!bassNode) return;
            bassNode.gain.value = document.getElementById('eq-bass').value;
            midNode.gain.value = document.getElementById('eq-mid').value;
            trebleNode.gain.value = document.getElementById('eq-treble').value;
            document.getElementById('v-bass').innerText = bassNode.gain.value + 'dB';
            document.getElementById('v-mid').innerText = midNode.gain.value + 'dB';
            document.getElementById('v-treble').innerText = trebleNode.gain.value + 'dB';
            if(save) localStorage.setItem('eq-settings', JSON.stringify({b: bassNode.gain.value, m: midNode.gain.value, t: trebleNode.gain.value}));
        }

        function loadSavedEQ() {
            const saved = JSON.parse(localStorage.getItem('eq-settings')) || {b:6, m:2, t:5};
            document.getElementById('eq-bass').value = saved.b;
            document.getElementById('eq-mid').value = saved.m;
            document.getElementById('eq-treble').value = saved.t;
            updateEQ(false);
        }

        function setPreset(b,m,t) { 
            document.getElementById('eq-bass').value = b; document.getElementById('eq-mid').value = m; document.getElementById('eq-treble').value = t; 
            updateEQ(true); 
        }

        // Right-click on viz to change mode
        function nextVizMode(e) { e.preventDefault(); state.vizMode = (state.vizMode + 1) % 3; }

        // Visualizer Drawing Loop
        function drawViz() {
            const canvas = document.getElementById('canvas-viz'); const ctx = canvas.getContext('2d');
            function frame() {
                requestAnimationFrame(frame); if (!analyser) return;
                const data = new Uint8Array(analyser.frequencyBinCount);
                if (state.vizMode === 0) analyser.getByteTimeDomainData(data); else analyser.getByteFrequencyData(data);
                ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = state.current.ambient; ctx.lineWidth = 2; ctx.beginPath();
                if(state.vizMode === 0) {
                    let x = 0; let sw = canvas.width / data.length;
                    for(let i=0; i<data.length; i++) { let y = (data[i]/128.0) * (canvas.height/2); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x += sw; }
                } else if(state.vizMode === 1) {
                    let x = 0; let bw = (canvas.width / data.length) * 2.5;
                    for(let i=0; i<data.length; i++) { let bh = data[i]/2; ctx.fillStyle = state.current.ambient; ctx.globalAlpha = 0.5; ctx.fillRect(x, canvas.height-bh, bw-1, bh); x += bw; }
                } else {
                    let cx = canvas.width/2; let cy = canvas.height/2;
                    for(let i=0; i<data.length; i+=4) { let r = 30 + (data[i]/5); let a = (i/data.length) * Math.PI * 2; ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r); }
                }
                ctx.stroke();
            }
            frame();
        }

        // Render UI based on state
        function render() {
            const all = [...STATIONS, ...customStations];
            document.getElementById('station-grid').innerHTML = all.map(s => `
            <div onclick='playSource(${JSON.stringify(s)})' class="cursor-pointer group relative">
                <div class="relative aspect-square rounded-lg bg-gradient-to-br ${s.color} border ${state.current.url === s.url ? 'border-white' : 'border-white/5'} transition-all overflow-hidden">
                    ${s.isCustom ? `<button onclick="removeStation('${s.id}', event)" class="absolute top-1 right-1 z-20 p-1 bg-black/50 rounded-md opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600/80"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
                    <div class="absolute inset-0 flex items-center justify-center opacity-20"><i data-lucide="disc-3" class="w-10 h-10 ${state.isPlaying && state.current.url === s.url ? 'rotating' : ''}"></i></div>
                </div>
                <h3 class="text-[8px] font-bold text-center mt-1 uppercase text-gray-400 truncate px-1">${s.name}</h3>
            </div>`).join('');
            
            const historyData = JSON.parse(localStorage.getItem('recent-history')) || [];
            document.getElementById('history-list').innerHTML = historyData.map(s => `<button onclick='playSource(${JSON.stringify(s)}, false)' class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[8px] hover:bg-white/10 transition-all uppercase font-bold">${s.name}</button>`).join('') || '<p class="text-[8px] text-gray-700 italic uppercase">No history...</p>';
            
            document.getElementById('sidebar-source-name').innerText = state.current.name;
            document.getElementById('player-info').innerHTML = `<div class="w-10 h-10 md:w-12 md:h-12 rounded-full vinyl-disc flex items-center justify-center ${state.isPlaying ? 'rotating' : ''} shadow-xl overflow-hidden"><div class="vinyl-reflection"></div><div class="w-2 h-2 md:w-3 md:h-3 bg-black rounded-full border border-white/20 z-10"></div></div><div class="overflow-hidden max-w-[80px] md:max-w-[150px]"><h4 class="font-bold text-[10px] md:text-sm text-white truncate">${state.current.name}</h4><p class="text-[8px] md:text-[10px] text-blue-400 font-black uppercase tracking-widest">${state.isPlaying ? 'On Air' : 'Paused'}</p></div>`;
            
            const barHTML = state.isPlaying ? '<div class="music-bar bar-anim"></div><div class="music-bar bar-anim bar-2"></div><div class="music-bar bar-anim bar-3"></div>' : '';
            document.getElementById('bars-left').innerHTML = barHTML; document.getElementById('bars-right').innerHTML = barHTML;
            document.getElementById('logo-icon').classList.toggle('rotating', state.isPlaying);
            document.getElementById('main-play-btn').innerHTML = state.isPlaying ? '<i data-lucide="pause" class="fill-current"></i>' : '<i data-lucide="play" class="fill-current ml-1"></i>';
            document.getElementById('ambient-glow').style.background = state.isPlaying ? `radial-gradient(circle at center, ${state.current.ambient} 0%, transparent 70%)` : 'transparent';
            updatePageTitle(); lucide.createIcons();
        }

        // Global Hotkeys
        window.onkeydown = (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); playNext(); }
            if (e.code === 'ArrowLeft') { e.preventDefault(); playPrev(); }
            if (e.code === 'ArrowUp') { e.preventDefault(); let nv = Math.min(1, audio.volume + 0.05); audio.volume = nv; volSlider.value = nv; }
            if (e.code === 'ArrowDown') { e.preventDefault(); let nv = Math.max(0, audio.volume - 0.05); audio.volume = nv; volSlider.value = nv; }
        };

        // Event Listeners
        document.getElementById('main-play-btn').onclick = () => togglePlay();
        document.getElementById('toggle-eq').onclick = (e) => { e.stopPropagation(); document.getElementById('eq-panel').classList.toggle('opacity-0'); document.getElementById('eq-panel').classList.toggle('pointer-events-none'); };
        window.onclick = (e) => { if(!document.getElementById('eq-panel').contains(e.target) && e.target.id !== 'toggle-eq') document.getElementById('eq-panel').classList.add('opacity-0', 'pointer-events-none'); };
        audio.onended = () => playNext(); 
        volSlider.oninput = (e) => audio.volume = e.target.value;

        // Initialization
        window.onload = () => { render(); audio.volume = 0.7; volSlider.value = 0.7; const appHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`); window.addEventListener('resize', appHeight); appHeight(); };
    </script>
</body>
</html>
