<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveRadio - Pure Dance & Trance</title>
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💿</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { transition: background 1.5s ease; }
        @keyframes eq-bounce { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
        .animate-eq-1 { animation: eq-bounce 0.7s infinite; transform-origin: bottom; }
        .animate-eq-2 { animation: eq-bounce 1.1s infinite; animation-delay: 0.1s; transform-origin: bottom; }
        .animate-eq-3 { animation: eq-bounce 0.9s infinite; animation-delay: 0.2s; transform-origin: bottom; }
        @keyframes rotate-disc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate-disc 4s linear infinite !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=range].eq-slider { -webkit-appearance: none; background: #27272a; height: 3px; border-radius: 5px; }
        input[type=range].eq-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 1px solid white; }
        .viz-fullscreen { position: fixed !important; inset: 0 !important; z-index: 100 !important; background: black !important; height: 100vh !important; border-radius: 0 !important; cursor: zoom-out !important; }
        #ambient-glow { position: fixed; inset: 0; pointer-events: none; opacity: 0.15; transition: background 2s ease; z-index: 0; }
        #eq-panel.scale-100 { transform: scale(1) translateY(-10px); }
    </style>
</head>
<body class="flex flex-col h-screen bg-black text-gray-100 font-sans overflow-hidden">
    <div id="ambient-glow"></div>
    <audio id="audio-player" preload="none" crossorigin="anonymous"></audio>

    <div class="flex flex-1 overflow-hidden relative z-10">
        <aside class="w-16 md:w-56 bg-gray-950/80 backdrop-blur-xl border-r border-white/5 flex flex-col">
            <div class="p-4 flex items-center gap-3 border-b border-white/5 justify-center md:justify-start">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/20">
                    <i data-lucide="disc-3" id="logo-icon" class="w-5 h-5 text-white transition-transform"></i>
                </div>
                <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-cyan-500 bg-clip-text text-transparent hidden md:block uppercase italic">WaveRadio</h1>
            </div>
            <nav class="p-3">
                <div class="flex items-center justify-center md:justify-start gap-3 px-3 py-3 bg-white/5 text-blue-400 rounded-xl">
                    <i data-lucide="music" class="w-5 h-5"></i>
                    <span class="hidden md:block font-bold uppercase text-[10px] tracking-widest text-white">Live Streams</span>
                </div>
            </nav>
        </aside>

        <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar relative">
            <header class="mb-6">
                <h2 class="text-3xl font-bold tracking-tight uppercase italic">Pure Electronic</h2>
                <p class="text-xs text-blue-500 uppercase tracking-[0.3em] mt-2 font-black">High-Energy Only</p>
            </header>

            <div id="station-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-10 xl:grid-cols-12 gap-3 mb-10"></div>

            <div id="viz-container" onclick="toggleFullscreen()" oncontextmenu="nextVizMode(event)" class="w-full h-32 bg-blue-950/10 rounded-2xl border border-white/5 overflow-hidden relative group cursor-zoom-in">
                <canvas id="canvas-viz" class="w-full h-full opacity-80"></canvas>
                <div class="absolute bottom-2 right-4 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                    <span class="text-[7px] text-gray-500 uppercase tracking-widest font-bold">Right click to change mode</span>
                </div>
            </div>

            <div class="mt-8 mb-4">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-3 flex items-center gap-2">
                    <i data-lucide="history" class="w-3 h-3"></i> Recently Played
                </h3>
                <div id="history-list" class="flex gap-2">
                    <p class="text-[9px] text-gray-700 italic lowercase tracking-wider">No history yet...</p>
                </div>
            </div>

            <div class="mt-16 pb-40 border-t border-white/5 pt-8 opacity-30 italic">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-relaxed max-w-2xl">
                    Non-commercial web player. Streams property of broadcasters.
                </p>
            </div>

            <div id="eq-panel" class="fixed bottom-28 right-4 w-64 bg-gray-950/95 backdrop-blur-2xl border border-white/10 p-5 rounded-2xl shadow-2xl scale-95 opacity-0 pointer-events-none transition-all duration-300 z-[60]">
                <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-blue-500">Master Equalizer</h3>
                </div>
                <div class="space-y-4 mb-6">
                    <div>
                        <div class="flex justify-between text-[8px] uppercase text-gray-500 mb-1"><span>Bass</span><span id="v-bass">0dB</span></div>
                        <input type="range" id="eq-bass" min="-10" max="10" value="0" class="eq-slider w-full">
                    </div>
                    <div>
                        <div class="flex justify-between text-[8px] uppercase text-gray-500 mb-1"><span>Mid</span><span id="v-mid">0dB</span></div>
                        <input type="range" id="eq-mid" min="-10" max="10" value="0" class="eq-slider w-full">
                    </div>
                    <div>
                        <div class="flex justify-between text-[8px] uppercase text-gray-500 mb-1"><span>Treble</span><span id="v-treble">0dB</span></div>
                        <input type="range" id="eq-treble" min="-10" max="10" value="0" class="eq-slider w-full">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPreset('techno')" class="text-[7px] uppercase font-bold bg-blue-600/10 text-blue-400 py-2 rounded hover:bg-blue-600/20 transition-colors">Techno</button>
                    <button onclick="setPreset('dance')" class="text-[7px] uppercase font-bold bg-pink-600/10 text-pink-400 py-2 rounded hover:bg-pink-600/20 transition-colors">Dance</button>
                    <button onclick="setPreset('trance')" class="text-[7px] uppercase font-bold bg-cyan-600/10 text-cyan-400 py-2 rounded hover:bg-cyan-600/20 transition-colors">Trance</button>
                </div>
            </div>
        </main>
    </div>

    <footer class="h-24 bg-gray-950/90 backdrop-blur-xl border-t border-white/10 px-4 md:px-10 flex items-center justify-between fixed bottom-0 w-full z-30">
        <div class="flex items-center gap-4 w-1/3" id="player-info"></div>
        <div class="flex flex-col items-center justify-center w-1/3">
            <div class="flex items-center gap-6">
                <div id="vis-left" class="hidden lg:flex items-end gap-1 h-8 opacity-0 transition-opacity">
                    <span class="w-1 bg-blue-500 animate-eq-1 h-full"></span>
                    <span class="w-1 bg-blue-400 animate-eq-2 h-2/3"></span>
                    <span class="w-1 bg-blue-300 animate-eq-3 h-4/5"></span>
                </div>
                <button id="main-play-btn" class="w-14 h-14 flex items-center justify-center bg-white text-black rounded-full hover:scale-110 active:scale-95 transition-all shadow-lg shadow-white/5">
                    <i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i>
                </button>
                <div id="vis-right" class="hidden lg:flex items-end gap-1 h-8 opacity-0 transition-opacity">
                    <span class="w-1 bg-blue-300 animate-eq-3 h-4/5"></span>
                    <span class="w-1 bg-blue-400 animate-eq-2 h-2/3"></span>
                    <span class="w-1 bg-blue-500 animate-eq-1 h-full"></span>
                </div>
            </div>
            <div id="player-status" class="mt-2 text-[10px] font-black uppercase tracking-[0.25em] text-gray-500">Ready</div>
        </div>
        <div class="flex items-center justify-end gap-3 w-1/3">
            <button id="toggle-eq" class="p-3 rounded-xl transition-all group">
                <i data-lucide="sliders-horizontal" id="eq-icon" class="w-5 h-5 text-gray-500 group-hover:text-blue-400"></i>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7" class="w-20 md:w-32 h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
    </footer>

    <script>
        const STATIONS = [
            { id: 4, name: "ILove Dance", url: "https://streams.ilovemusic.de/iloveradio2.mp3", color: "from-pink-600 to-blue-600", ambient: "#db2777" },
            { id: 2, name: "ILove Trance", url: "https://streams.ilovemusic.de/iloveradio10.mp3", color: "from-blue-400 to-blue-800", ambient: "#1e40af" },
            { id: 7, name: "Club Mix", url: "https://streams.ilovemusic.de/iloveradio14.mp3", color: "from-purple-500 to-blue-700", ambient: "#7e22ce" },
            { id: 8, name: "Dub Step", url: "https://ice1.somafm.com/dubstep-128-mp3", color: "from-red-600 to-black", ambient: "#991b1b" },
            { id: 9, name: "Electro EDM", url: "https://streams.ilovemusic.de/iloveradio4.mp3", color: "from-green-500 to-blue-600", ambient: "#15803d" },
            { id: 10, name: "Hardstyle", url: "https://streams.ilovemusic.de/iloveradio5.mp3", color: "from-red-700 to-black", ambient: "#7f1d1d" },
        ];

        let state = { current: STATIONS[0], isPlaying: false, history: [], vizMode: 0 };
        const audio = document.getElementById('audio-player');
        let audioCtx, source, analyser, bass, mid, treble;
        
        const favCanvas = document.createElement('canvas');
        favCanvas.width = 32; favCanvas.height = 32;
        const favCtx = favCanvas.getContext('2d');
        let favRotation = 0;

        function animateFavicon() {
            if (!state.isPlaying) return;
            favCtx.clearRect(0, 0, 32, 32);
            favCtx.save();
            favCtx.translate(16, 16);
            favCtx.rotate(favRotation);
            favCtx.font = "24px Arial";
            favCtx.textAlign = "center";
            favCtx.textBaseline = "middle";
            favCtx.fillText("💿", 0, 0);
            favCtx.restore();
            document.getElementById('favicon').href = favCanvas.toDataURL('image/png');
            favRotation += 0.15;
            setTimeout(animateFavicon, 100);
        }

        function saveEQ() {
            const settings = {
                bass: document.getElementById('eq-bass').value,
                mid: document.getElementById('eq-mid').value,
                treble: document.getElementById('eq-treble').value
            };
            localStorage.setItem('waveradio_eq', JSON.stringify(settings));
        }

        function loadEQ() {
            const saved = JSON.parse(localStorage.getItem('waveradio_eq')) || { bass: 0, mid: 0, treble: 0 };
            document.getElementById('eq-bass').value = saved.bass;
            document.getElementById('eq-mid').value = saved.mid;
            document.getElementById('eq-treble').value = saved.treble;
            document.getElementById('v-bass').textContent = saved.bass + 'dB';
            document.getElementById('v-mid').textContent = saved.mid + 'dB';
            document.getElementById('v-treble').textContent = saved.treble + 'dB';
            return saved;
        }

        function saveLastStation(id) { localStorage.setItem('waveradio_last_station', id); }
        function loadLastStation() {
            const lastId = localStorage.getItem('waveradio_last_station');
            if (lastId) {
                const station = STATIONS.find(s => s.id == lastId);
                if (station) state.current = station;
            }
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            const saved = loadEQ();
            bass = audioCtx.createBiquadFilter(); bass.type = 'lowshelf'; bass.frequency.value = 200; bass.gain.value = saved.bass;
            mid = audioCtx.createBiquadFilter(); mid.type = 'peaking'; mid.frequency.value = 1000; mid.gain.value = saved.mid;
            treble = audioCtx.createBiquadFilter(); treble.type = 'highshelf'; treble.frequency.value = 3000; treble.gain.value = saved.treble;
            source.connect(bass).connect(mid).connect(treble).connect(analyser).connect(audioCtx.destination);
            drawViz();
        }

        function nextVizMode(e) { e.preventDefault(); state.vizMode = (state.vizMode + 1) % 3; }

        function drawViz() {
            const canvas = document.getElementById('canvas-viz');
            const ctx = canvas.getContext('2d');
            function renderFrame() {
                requestAnimationFrame(renderFrame);
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = state.isPlaying ? state.current.ambient : '#3b82f6';
                ctx.fillStyle = state.isPlaying ? state.current.ambient : '#3b82f6';
                ctx.lineWidth = 2;
                if (state.vizMode === 0) {
                    analyser.getByteTimeDomainData(dataArray);
                    ctx.beginPath();
                    let x = 0, sliceWidth = canvas.width / bufferLength;
                    for (let i = 0; i < bufferLength; i++) {
                        let v = dataArray[i] / 128.0, y = v * canvas.height / 2;
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    ctx.stroke();
                } else if (state.vizMode === 1) {
                    analyser.getByteFrequencyData(dataArray);
                    let barWidth = (canvas.width / bufferLength) * 2.5, barHeight, x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        barHeight = dataArray[i] / 2;
                        ctx.globalAlpha = 0.6; ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                        x += barWidth;
                    }
                    ctx.globalAlpha = 1;
                } else if (state.vizMode === 2) {
                    analyser.getByteFrequencyData(dataArray);
                    let centerX = canvas.width / 2, centerY = canvas.height / 2, radius = state.isPlaying ? 30 + (dataArray[0]/10) : 40;
                    ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI); ctx.stroke();
                    for(let i = 0; i < bufferLength; i += 4) {
                        let angle = (i / bufferLength) * Math.PI * 2, h = dataArray[i] / 4;
                        let x1 = centerX + Math.cos(angle) * radius, y1 = centerY + Math.sin(angle) * radius;
                        let x2 = centerX + Math.cos(angle) * (radius + h), y2 = centerY + Math.sin(angle) * (radius + h);
                        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                    }
                }
            }
            renderFrame();
        }

        async function select(id) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const s = STATIONS.find(x => x.id === id);
            if (state.current.id === s.id && state.isPlaying) {
                audio.pause(); state.isPlaying = false;
            } else {
                if (state.current.id !== s.id) {
                    state.history = [state.current, ...state.history.filter(h => h.id !== s.id)].slice(0, 3);
                }
                state.current = s; audio.src = s.url;
                saveLastStation(s.id);
                try { await audio.play(); state.isPlaying = true; animateFavicon(); } catch (e) { state.isPlaying = false; }
            }
            render();
        }

        function setPreset(type) {
            const b = document.getElementById('eq-bass'), m = document.getElementById('eq-mid'), t = document.getElementById('eq-treble');
            if (type === 'techno') { b.value = 6; m.value = 2; t.value = 5; }
            else if (type === 'dance') { b.value = 5; m.value = 0; t.value = 6; }
            else if (type === 'trance') { b.value = 8; m.value = -2; t.value = 7; }
            [b, m, t].forEach(el => el.dispatchEvent(new Event('input')));
            saveEQ();
        }

        const eqPanel = document.getElementById('eq-panel');
        const btnEq = document.getElementById('toggle-eq');
        btnEq.onclick = (e) => {
            e.stopPropagation();
            eqPanel.classList.toggle('opacity-0');
            eqPanel.classList.toggle('pointer-events-none');
            eqPanel.classList.toggle('scale-100');
        };
        document.addEventListener('click', (e) => {
            if (!eqPanel.contains(e.target) && e.target !== btnEq) {
                eqPanel.classList.add('opacity-0', 'pointer-events-none');
                eqPanel.classList.remove('scale-100');
            }
        });

        function render() {
            const grid = document.getElementById('station-grid');
            grid.innerHTML = STATIONS.map(s => `
                <div onclick="select(${s.id})" class="group cursor-pointer">
                    <div class="relative aspect-square rounded-lg bg-gradient-to-br ${s.color} mb-1 overflow-hidden border ${state.current.id === s.id ? 'border-white' : 'border-white/5'} transition-all duration-500">
                        <div class="absolute inset-0 flex items-center justify-center opacity-20">
                            <i data-lucide="disc-3" class="w-10 h-10 ${state.current.id === s.id && state.isPlaying ? 'rotating' : ''}"></i>
                        </div>
                    </div>
                    <h3 class="text-[8px] font-bold text-center uppercase truncate">${s.name}</h3>
                </div>`).join('');
            
            const info = document.getElementById('player-info');
            // TU JE ZMENA: Vylepšená rotujúca ikona s pásikmi len vľavo dole
            info.innerHTML = `
                <div class="w-12 h-12 rounded-full bg-gradient-to-br ${state.current.color} flex items-center justify-center ${state.isPlaying ? 'rotating' : ''} shadow-lg relative overflow-hidden">
                    <div class="w-3 h-3 bg-black rounded-full border border-white/20 z-10"></div>
                    <div class="absolute inset-0 opacity-40">
                         <div class="absolute top-0 left-1/2 w-0.5 h-full bg-white/60 -translate-x-1/2 blur-[1px]"></div>
                         <div class="absolute top-1/2 left-0 w-full h-0.5 bg-white/30 -translate-y-1/2 blur-[1px]"></div>
                    </div>
                </div>
                <div class="hidden sm:block">
                    <h4 class="font-bold text-sm text-white">${state.current.name}</h4>
                    <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest mt-0.5">${state.isPlaying ? 'On Air' : 'Paused'}</p>
                </div>`;
            
            const histList = document.getElementById('history-list');
            if(state.history.length > 0) {
                histList.innerHTML = state.history.map(s => `
                    <button onclick="select(${s.id})" class="px-3 py-1 bg-white/5 hover:bg-white/10 border border-white/5 rounded-lg text-[9px] font-bold text-gray-400 transition-colors">
                        ${s.name}
                    </button>`).join('');
            }

            const glow = document.getElementById('ambient-glow');
            const visL = document.getElementById('vis-left'), visR = document.getElementById('vis-right'), logo = document.getElementById('logo-icon');
            
            if (state.isPlaying) {
                document.getElementById('main-play-btn').innerHTML = '<i data-lucide="pause" class="fill-current"></i>';
                document.getElementById('player-status').textContent = 'Live Streaming';
                visL.classList.replace('opacity-0', 'opacity-100'); visR.classList.replace('opacity-0', 'opacity-100');
                logo.classList.add('rotating');
                glow.style.background = `radial-gradient(circle at center, ${state.current.ambient} 0%, transparent 70%)`;
            } else {
                document.getElementById('main-play-btn').innerHTML = '<i data-lucide="play" class="fill-current ml-1"></i>';
                document.getElementById('player-status').textContent = 'Ready';
                visL.classList.replace('opacity-100', 'opacity-0'); visR.classList.replace('opacity-100', 'opacity-0');
                logo.classList.remove('rotating'); glow.style.background = 'transparent';
                document.getElementById('favicon').href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💿</text></svg>";
            }
            lucide.createIcons();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); select(state.current.id); }
            if (e.code === 'ArrowUp') { e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); document.getElementById('volume-slider').value = audio.volume; }
            if (e.code === 'ArrowDown') { e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); document.getElementById('volume-slider').value = audio.volume; }
            if (e.code === 'ArrowRight') { 
                const idx = STATIONS.findIndex(s => s.id === state.current.id);
                select(STATIONS[(idx + 1) % STATIONS.length].id);
            }
            if (e.code === 'ArrowLeft') {
                const idx = STATIONS.findIndex(s => s.id === state.current.id);
                select(STATIONS[(idx - 1 + STATIONS.length) % STATIONS.length].id);
            }
        });

        function toggleFullscreen() { document.getElementById('viz-container').classList.toggle('viz-fullscreen'); }

        document.getElementById('eq-bass').oninput = (e) => { if(bass) bass.gain.value = e.target.value; document.getElementById('v-bass').textContent = e.target.value + 'dB'; saveEQ(); };
        document.getElementById('eq-mid').oninput = (e) => { if(mid) mid.gain.value = e.target.value; document.getElementById('v-mid').textContent = e.target.value + 'dB'; saveEQ(); };
        document.getElementById('eq-treble').oninput = (e) => { if(treble) treble.gain.value = e.target.value; document.getElementById('v-treble').textContent = e.target.value + 'dB'; saveEQ(); };
        
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        document.getElementById('main-play-btn').onclick = () => select(state.current.id);

        window.onload = () => { 
            loadLastStation(); 
            loadEQ(); 
            audio.volume = document.getElementById('volume-slider').value;
            render(); 
        };
    </script>
</body>
</html>
